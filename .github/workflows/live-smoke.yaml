name: Live Smoke Test

on:
  workflow_dispatch:
    inputs:
      modalities:
        description: Comma-separated modalities to test
        required: false
        default: image,audio,video
      api_base:
        description: Deploy API base URL
        required: false
        default: https://visgate-deploy-api-wxup7pxrsa-ey.a.run.app/deployapi
  workflow_run:
    workflows:
      - Build and Push Inference Worker
    types:
      - completed

concurrency:
  group: live-smoke
  cancel-in-progress: false

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install boto3

      - name: Install cloudflared
        run: |
          sudo wget -q -O /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Load smoke and R2 secrets
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          {
            echo "RUNPOD_API_KEY=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_SMOKE_TEST_RUNPOD --project "$PROJECT_ID")"
            echo "HF_TOKEN=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_SMOKE_TEST_HF_KEY --project "$PROJECT_ID")"
            echo "INTERNAL_WEBHOOK_SECRET=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_INTERNAL_WEBHOOK_SECRET --project "$PROJECT_ID")"
            echo "INPUT_R2_ACCESS_KEY_ID=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_INFERENCE_R2_ACCESS_KEY_ID_INPUT_R --project "$PROJECT_ID")"
            echo "INPUT_R2_SECRET_ACCESS_KEY=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_INFERENCE_R2_SECRET_ACCESS_KEY_INPUT_R --project "$PROJECT_ID")"
            echo "INPUT_R2_BUCKET_NAME=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_INFERENCE_R2_BUCKET_NAME_INPUT --project "$PROJECT_ID")"
            echo "OUTPUT_R2_ACCESS_KEY_ID=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_INFERENCE_R2_ACCESS_KEY_ID_OUTPUT_RW --project "$PROJECT_ID")"
            echo "OUTPUT_R2_SECRET_ACCESS_KEY=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_INFERENCE_R2_SECRET_ACCESS_KEY_OUTPUT_RW --project "$PROJECT_ID")"
            echo "OUTPUT_R2_BUCKET_NAME=$(gcloud secrets versions access latest --secret=VISGATE_DEPLOY_API_INFERENCE_R2_BUCKET_NAME_OUTPUT --project "$PROJECT_ID")"
            echo "R2_ENDPOINT_URL=https://088e0d2618d33e55a76e4d65b439d6c4.r2.cloudflarestorage.com"
            echo "GCP_PROJECT_ID=$PROJECT_ID"
          } >> "$GITHUB_ENV"

      - name: Wait for deploy workflow on same SHA
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          repo = os.environ["REPO"]
          target_sha = os.environ["TARGET_SHA"]
          endpoint = f"repos/{repo}/actions/workflows/deploy.yaml/runs?head_sha={target_sha}&per_page=5"

          for _ in range(60):
              output = subprocess.check_output(["gh", "api", endpoint], text=True)
              runs = json.loads(output).get("workflow_runs", [])
              if runs:
                  run = runs[0]
                  status = run.get("status")
                  conclusion = run.get("conclusion")
                  print(json.dumps({
                      "deploy_run_id": run.get("id"),
                      "status": status,
                      "conclusion": conclusion,
                  }))
                  if status == "completed":
                      if conclusion != "success":
                          raise SystemExit(f"Deploy workflow failed for {target_sha}: {conclusion}")
                      break
              time.sleep(10)
          else:
              raise SystemExit(f"Timed out waiting for deploy workflow on {target_sha}")
          PY

      - name: Run live smoke
        env:
          API_BASE: ${{ github.event.inputs.api_base || 'https://visgate-deploy-api-wxup7pxrsa-ey.a.run.app/deployapi' }}
          MODALITIES: ${{ github.event.inputs.modalities || 'image,audio,video' }}
        run: python scripts/live_smoke.py --output smoke-results.json

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-results
          path: smoke-results.json