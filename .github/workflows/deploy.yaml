name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # visgate
  REGION: europe-west3 # Align with Firestore region
  SERVICE_NAME: visgate-deploy-api
  IMAGE: europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/visgate/visgate-deploy-api:${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}' # Service Account Key JSON

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Use gcloud CLI
        run: gcloud info

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            deploy-api/requirements.txt
            deploy-api/requirements-dev.txt

      - name: Run Tests
        working-directory: deploy-api
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          python -m pytest tests/ -q --tb=short

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          docker build -t $IMAGE -f deploy-api/Dockerfile deploy-api
          docker push $IMAGE

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE }}
          region: ${{ env.REGION }}
          env_vars: |
            GCP_PROJECT_ID=${{ env.PROJECT_ID }}
            FIRESTORE_COLLECTION_DEPLOYMENTS=visgate_deploy_api_deployments
            FIRESTORE_COLLECTION_LOGS=visgate_deploy_api_logs
            FIRESTORE_COLLECTION_API_KEYS=visgate_deploy_api_api_keys
            FIRESTORE_COLLECTION_GPU_REGISTRY=visgate_deploy_api_gpu_registry
            FIRESTORE_COLLECTION_GPU_TIERS=visgate_deploy_api_gpu_tiers
            FIRESTORE_COLLECTION_INFERENCE_JOBS=inference_jobs
            GCP_LOCATION=${{ env.REGION }}
            CLOUD_TASKS_QUEUE_PATH=projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/queues/visgate-orchestrator-queue
            CLOUD_TASKS_SERVICE_ACCOUNT=93820292919-compute@developer.gserviceaccount.com
            INTERNAL_WEBHOOK_BASE_URL=https://visgate-deploy-api-wxup7pxrsa-ey.a.run.app
            VISGATE_DEPLOY_API_ROOT_PATH=/deployapi
            DOCKER_IMAGE=visgateai/inference:latest
            DOCKER_IMAGE_IMAGE=visgateai/inference-image:latest
            DOCKER_IMAGE_AUDIO=visgateai/inference-audio:latest
            DOCKER_IMAGE_VIDEO=visgateai/inference-video:latest
            LOG_LEVEL=INFO
            RUNPOD_WORKERS_MAX=1
            RUNPOD_WORKERS_MIN=0
            RUNPOD_WORKERS_MIN_VIDEO=1
            RUNPOD_EXECUTION_TIMEOUT_MS=300000
            RUNPOD_EXECUTION_TIMEOUT_MS_VIDEO=900000
          secrets: |
            RUNPOD_TEMPLATE_ID=VISGATE_DEPLOY_API_RUNPOD_TEMPLATE_ID:latest
            INTERNAL_WEBHOOK_SECRET=VISGATE_DEPLOY_API_INTERNAL_WEBHOOK_SECRET:latest
            VISGATE_DEPLOY_API_INFERENCE_R2_ACCESS_KEY_ID_OUTPUT_RW=VISGATE_DEPLOY_API_INFERENCE_R2_ACCESS_KEY_ID_OUTPUT_RW:latest
            VISGATE_DEPLOY_API_INFERENCE_R2_SECRET_ACCESS_KEY_OUTPUT_RW=VISGATE_DEPLOY_API_INFERENCE_R2_SECRET_ACCESS_KEY_OUTPUT_RW:latest
            VISGATE_DEPLOY_API_INFERENCE_R2_ACCESS_KEY_ID_INPUT_R=VISGATE_DEPLOY_API_INFERENCE_R2_ACCESS_KEY_ID_INPUT_R:latest
            VISGATE_DEPLOY_API_INFERENCE_R2_SECRET_ACCESS_KEY_INPUT_R=VISGATE_DEPLOY_API_INFERENCE_R2_SECRET_ACCESS_KEY_INPUT_R:latest
            VISGATE_DEPLOY_API_INFERENCE_R2_BUCKET_NAME_OUTPUT=VISGATE_DEPLOY_API_INFERENCE_R2_BUCKET_NAME_OUTPUT:latest
            VISGATE_DEPLOY_API_INFERENCE_R2_BUCKET_NAME_INPUT=VISGATE_DEPLOY_API_INFERENCE_R2_BUCKET_NAME_INPUT:latest
            VISGATE_DEPLOY_API_SMOKE_TEST_RUNPOD=VISGATE_DEPLOY_API_SMOKE_TEST_RUNPOD:latest
            VISGATE_DEPLOY_API_SMOKE_TEST_HF_KEY=VISGATE_DEPLOY_API_SMOKE_TEST_HF_KEY:latest
          flags: '--allow-unauthenticated --execution-environment gen2 --remove-secrets VISGATE_DEPLOYAPI_R2_ACCESS_KEY_ID_RW,VISGATE_DEPLOYAPI_R2_SECRET_ACCESS_KEY_RW,VISGATE_DEPLOYAPI_R2_ENDPOINT_URL,VISGATE_DEPLOYAPI_R2_ACCESS_KEY_ID_RO,VISGATE_DEPLOYAPI_R2_SECRET_ACCESS_KEY_RO,RUNPOD_TEMPLATE_ID_IMAGE,RUNPOD_TEMPLATE_ID_AUDIO,RUNPOD_TEMPLATE_ID_VIDEO --remove-env-vars RUNPOD_TEMPLATE_ID_IMAGE,RUNPOD_TEMPLATE_ID_AUDIO,RUNPOD_TEMPLATE_ID_VIDEO'

      - name: Route Traffic to Latest Revision
        run: |
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --to-latest \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}"

      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
