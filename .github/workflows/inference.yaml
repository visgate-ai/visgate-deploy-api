name: Build and Push Inference Worker

on:
  push:
    branches:
      - main
    paths:
      - 'inference/**'
  workflow_dispatch:
    inputs:
      targets:
        description: Comma-separated worker targets to build
        required: false
        default: image,audio,video

concurrency:
  group: inference-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: image
            dockerfile: ./inference/Dockerfile
            tags: |
              visgateai/inference-image:latest
              visgateai/inference-image:${{ github.sha }}
              visgateai/inference:latest
              visgateai/inference:${{ github.sha }}
          - name: audio
            dockerfile: ./inference/Dockerfile.audio
            tags: |
              visgateai/inference-audio:latest
              visgateai/inference-audio:${{ github.sha }}
          - name: video
            dockerfile: ./inference/Dockerfile.video
            tags: |
              visgateai/inference-video:latest
              visgateai/inference-video:${{ github.sha }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        if: ${{ github.event_name != 'workflow_dispatch' || contains(format(',{0},', inputs.targets), format(',{0},', matrix.name)) }}
        uses: actions/checkout@v4

      - name: Free disk space on runner
        if: ${{ github.event_name != 'workflow_dispatch' || contains(format(',{0},', inputs.targets), format(',{0},', matrix.name)) }}
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Check Docker Hub credentials
        id: dockerhub
        if: ${{ github.event_name != 'workflow_dispatch' || contains(format(',{0},', inputs.targets), format(',{0},', matrix.name)) }}
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKER_HUB_USERNAME and/or DOCKER_HUB_TOKEN is missing. Skipping Docker Hub push."
          fi

      - name: Log in to Docker Hub
        if: ${{ (github.event_name != 'workflow_dispatch' || contains(format(',{0},', inputs.targets), format(',{0},', matrix.name))) && steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ (github.event_name != 'workflow_dispatch' || contains(format(',{0},', inputs.targets), format(',{0},', matrix.name))) && steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: ${{ (github.event_name != 'workflow_dispatch' || contains(format(',{0},', inputs.targets), format(',{0},', matrix.name))) && steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./inference
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.tags }}

      - name: Skip Docker push (credentials missing)
        if: ${{ (github.event_name != 'workflow_dispatch' || contains(format(',{0},', inputs.targets), format(',{0},', matrix.name))) && steps.dockerhub.outputs.enabled != 'true' }}
        run: echo "Docker Hub credentials are not configured. Workflow completed without pushing image."

      - name: Skip unselected target
        if: ${{ github.event_name == 'workflow_dispatch' && !contains(format(',{0},', inputs.targets), format(',{0},', matrix.name)) }}
        run: echo "Skipping target '${{ matrix.name }}' because it was not requested in workflow_dispatch inputs."
